<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <input type="number" id="in" placeholder="Enter Your Age"> <button onclick="check()">Check</button>

    <h1 id="message"></h1>

    <script>
        function check() {

            let input = document.querySelector('input');
            let message = document.getElementById('message');

            if (input.value >= 18) {
                document.body.style.background = 'green';
                message.textContent = "Yes,You can drive!";

            } else {

                document.body.style.background = 'red';
                message.textContent = "No,You can't drive!";

            }
        }
    </script>

</body>

</html>
